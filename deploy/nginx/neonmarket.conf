# NGINX site config for NeonMarket.
#
# Serves the built React SPA as static files and proxies /api (plus the
# Sanctum CSRF cookie endpoint) to PHP-FPM running the Laravel app.
#
# Layout assumed on the server:
#   /var/www/neonmarket/backend/public   <- Laravel public root (index.php)
#   /var/www/neonmarket/frontend/dist     <- Vite build output (index.html)

server {
    listen 80;
    server_name neonmarket.example.com;

    # --- Frontend SPA ---
    root /var/www/neonmarket/frontend/dist;
    index index.html;

    # Long-cache hashed assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- API -> Laravel (PHP-FPM) ---
    location ~ ^/(api|sanctum|up) {
        root /var/www/neonmarket/backend/public;
        try_files $uri /index.php?$query_string;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $document_root;
        }
    }

    # --- SPA history fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 12M;
}
