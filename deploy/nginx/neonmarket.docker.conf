# NGINX config used by docker-compose. Differs from the bare-metal config
# only in fastcgi_pass: here PHP-FPM is a separate container on TCP :9000.

server {
    listen 80;
    server_name localhost;

    root /var/www/neonmarket/frontend/dist;
    index index.html;

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ ^/(api|sanctum|up) {
        root /var/www/neonmarket/backend/public;
        try_files $uri /index.php?$query_string;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass app:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/backend/public$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 12M;
}
